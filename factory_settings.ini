; Placeholders supported in any FACTORY_* string (resolved on first
; boot via SettingValue::format()):
;
;  #{platform}         "esp32"
;  #{unique_id}        MAC, lowercase, no separators ("404cca4798f4")
;  #{device_id}        Full canonical id "<project>-<mac12>-<uid8>"
;                      ("ESPRackDemo-404cca4798f4-deb315c6"). Same
;                      string used as X.509 Subject CN, mothership
;                      deviceId, and AutoUpdate `did=`. Up to ~33 chars
;                      with PROJECT_NAME="ESPRackDemo" — beware of the
;                      32-octet SSID limit if your project name is long.
;  #{device_id_short}  Compact "<project>-<uid8>" without MAC
;                      ("ESPRackDemo-deb315c6"). Same per-device
;                      uniqueness anchor as the canonical id (eFuse
;                      uid8) but ~13 chars shorter — fits SSID and
;                      24-char DHCP hostname cap.
;  #{random}           A random number encoded as a hex string

[factory_settings]
; Project identity — the SINGLE SOURCE OF TRUTH for the device's
; on-the-wire identity. main.cpp threads PROJECT_NAME + PROJECT_VERSION
; into ESPRack::Builder(...); App ctor publishes both (plus HW_REVISION)
; via DeviceIdentity::set*() so every consumer reads the same string:
;
;   * /rest/uiManifest.device.{name,version}   — React UI brand
;   * X.509 Subject CN (canonical device ID)   — CertManagerService
;   * mothership /checkin payload {fwVer,hwRev}— MothershipService
;   * /firmware-update?did=&hw=                — AutoUpdateService
;   * System / Identity tab                    — operator-facing display
;
; Editing here propagates everywhere on next build. The framework
; version (ESPRACK_VERSION_STR) is independent and lives in
; lib/ESPRack/include/Version.h.

build_flags =
  -Wno-cpp
  ; Project identity — propagated to every device-facing string
  -D FACTORY_PROJECT_NAME=\"ESPRackDemo\"
  -D FACTORY_PROJECT_VERSION=\"v0.1.6-pre\"
  -D FACTORY_HW_REVISION=\"rev-A\"

  ; WiFi settings
  -D FACTORY_WIFI_SSID=\"\"
  -D FACTORY_WIFI_PASSWORD=\"\"
  -D FACTORY_WIFI_HOSTNAME=\"#{device_id_short}\" ; supports placeholders

  ; Access point settings
  -D FACTORY_AP_PROVISION_MODE=AP_MODE_ALWAYS
  -D FACTORY_AP_SSID=\"#{device_id_short}\" ; 1-32 octets (IEEE 802.11), supports placeholders
  -D FACTORY_AP_PASSWORD=\"esp-react\" ; 8-64 characters
  -D FACTORY_AP_CHANNEL=1
  -D FACTORY_AP_SSID_HIDDEN=false
  -D FACTORY_AP_MAX_CLIENTS=4
  -D FACTORY_AP_LOCAL_IP=\"192.168.4.1\"
  -D FACTORY_AP_GATEWAY_IP=\"192.168.4.1\"
  -D FACTORY_AP_SUBNET_MASK=\"255.255.255.0\"

  ; User credentials for admin and guest user
  -D FACTORY_ADMIN_USERNAME=\"admin\"
  -D FACTORY_ADMIN_PASSWORD=\"admin\"
  -D FACTORY_GUEST_USERNAME=\"guest\"
  -D FACTORY_GUEST_PASSWORD=\"guest\"

  ; NTP settings
  -D FACTORY_NTP_ENABLED=true
  -D FACTORY_NTP_TIME_ZONE_LABEL=\"Europe/London\"
  -D FACTORY_NTP_TIME_ZONE_FORMAT=\"GMT0BST,M3.5.0/1,M10.5.0\"
  -D FACTORY_NTP_SERVER=\"time.google.com\"

  ; OTA settings
  -D FACTORY_OTA_PORT=8266
  -D FACTORY_OTA_PASSWORD=\"esp-react\"
  -D FACTORY_OTA_ENABLED=true

  ; MQTT settings
  -D FACTORY_MQTT_ENABLED=false
  -D FACTORY_MQTT_HOST=\"test.mosquitto.org\"
  -D FACTORY_MQTT_PORT=1883
  -D FACTORY_MQTT_USERNAME=\"\" ; supports placeholders
  -D FACTORY_MQTT_PASSWORD=\"\"
  -D FACTORY_MQTT_CLIENT_ID=\"#{platform}-#{unique_id}\" ; supports placeholders
  -D FACTORY_MQTT_KEEP_ALIVE=60
  -D FACTORY_MQTT_CLEAN_SESSION=true
  -D FACTORY_MQTT_MAX_TOPIC_LENGTH=128

  ; JWT Secret
  -D FACTORY_JWT_SECRET=\"#{random}-#{random}\" ; supports placeholders
