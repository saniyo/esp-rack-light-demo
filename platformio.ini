; esp-rack-light-demo — reference consumer of ESPRack.
;
; Local-development setup: ESPRack + its modules are pulled from the
; sibling repo `../esp-rack/` via lib_extra_dirs. Once esp-rack
; publishes tagged GitHub releases, replace the local path with:
;   lib_deps = https://github.com/saniyo/esp-rack.git#v0.1.0

[platformio]
default_envs = esp32-c6-devkitc-1

[env]
framework        = arduino
upload_protocol  = esptool
upload_speed     = 921600
monitor_speed    = 115200
monitor_filters  = esp32_exception_decoder, time

; Pulls in ESPRack core + every module library found under
; ../esp-rack/lib and ../esp-rack/modules.
lib_extra_dirs =
  ../esp-rack/lib
  ../esp-rack/modules

lib_deps =
  ESPRack
  WiFiModule
  bblanchon/ArduinoJson@>=6.0.0,<7.0.0
  mathieucarbou/AsyncTCP @ 3.3.2
  mathieucarbou/ESPAsyncWebServer @ 3.6.0

lib_compat_mode = strict
lib_ignore      = ESPAsyncTCP

build_flags =
  -D NO_GLOBAL_ARDUINOOTA
  -D CORE_DEBUG_LEVEL=3
  ; Phase 1 demo runs without auth (NullSecurityManager) — set =1 once
  ; SecurityModule lands.
  -D FT_SECURITY=0
  -D FT_WEBSOCKET=1

[env:esp32-c6-devkitc-1]
platform                 = https://github.com/pioarduino/platform-espressif32.git#54.03.21-2
board                    = esp32-c6-devkitc-1
board_upload.flash_size  = 16MB
board_build.partitions   = default_16MB.csv
board_build.filesystem   = littlefs
build_flags =
  -DARDUINO_USB_MODE=0
  -DARDUINO_USB_CDC_ON_BOOT=0
  ${env.build_flags}
