; esp-rack-light-demo — reference consumer of ESPRack.
;
; Local-development setup: ESPRack + its modules are pulled from the
; sibling repo `../esp-rack/` via lib_extra_dirs. Once esp-rack
; publishes tagged GitHub releases, replace the local path with:
;   lib_deps = https://github.com/saniyo/esp-rack.git#v0.1.0

[platformio]
extra_configs =
  factory_settings.ini
  features.ini
default_envs = esp32-c6-devkitc-1

[env]
framework        = arduino
upload_protocol  = esptool
upload_speed     = 921600
monitor_speed    = 115200
monitor_filters  = esp32_exception_decoder, time

; Pulls in ESPRack core + every module library found under
; ../esp-rack/lib and ../esp-rack/modules.
lib_extra_dirs =
  ../esp-rack/lib
  ../esp-rack/modules

lib_deps =
  ESPRack
  WiFiModule
  APModule
  SecurityModule
  FeaturesModule
  UiDynModule
  PresenceModule
  RestartModule
  FactoryResetModule
  FileSystemModule
  SystemStatusModule
  WsDiagModule
  ConfigManagerUiModule
  WebEndpointsModule
  NTPModule
  OTAModule
  UploadFirmwareModule
  AutoUpdateModule
  MqttModule
  TelegramModule
  bblanchon/ArduinoJson@>=6.0.0,<7.0.0
  mathieucarbou/AsyncTCP @ 3.3.2
  mathieucarbou/ESPAsyncWebServer @ 3.6.0
  AsyncMqttClient@>=0.9.0,<1.0.0
  WiFiClientSecure
  https://github.com/saniyo/Universal-Arduino-Telegram-Bot

lib_compat_mode = strict
lib_ignore      = ESPAsyncTCP

; sync_ui.py runs FIRST: copies ../esp-rack/ui/ → ./interface/ so the
; consumer's React tree is a strict mirror of the library, not a fork.
; Then build_interface.py kicks `npm run build` against the populated
; tree and bakes WWWData.h.
extra_scripts =
  pre:scripts/sync_ui.py
  pre:scripts/build_interface.py

build_flags =
  ${factory_settings.build_flags}
  ${features.build_flags}
  -D NO_GLOBAL_ARDUINOOTA
  -D PROGMEM_WWW
  -D CORE_DEBUG_LEVEL=3

[env:esp32-c6-devkitc-1]
platform                 = https://github.com/pioarduino/platform-espressif32.git#54.03.21-2
board                    = esp32-c6-devkitc-1
board_upload.flash_size  = 16MB
board_build.partitions   = default_16MB.csv
board_build.filesystem   = littlefs
build_flags =
  -DARDUINO_USB_MODE=0
  -DARDUINO_USB_CDC_ON_BOOT=0
  ${env.build_flags}
