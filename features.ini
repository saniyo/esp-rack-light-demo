[features]
; Consumer-side feature overrides. Defaults for every framework FT_*
; flag live in esp-rack's lib/ESPRack/include/Features.h — all on for
; framework features, FT_PROJECT off (it's the consumer's own service,
; library can't know to enable it), FT_SECRETS_VAULT on for safety.
;
; You only declare here what you want DIFFERENT from the library
; default. To trim flash by dropping a feature: -D FT_FOO=0. To
; enable the consumer service: -D FT_PROJECT=1. That's it.
;
; Examples of overrides if you want a smaller footprint:
;   -D FT_TELEGRAM=0         ; drop Telegram bot
;   -D FT_AUTO_UPDATE=0      ; drop periodic OTA poll
;   -D FT_SECRETS_VAULT=0    ; plaintext secrets on disk (debug only)
;
; Note: an FT_X=0 override only PREPROCESSES OUT the corresponding
; .cpp innards. Whether the module is actually instantiated still
; depends on Builder().install<XxxModule>() in main.cpp — keep that
; consistent (don't install a module you've FT-disabled, or you
; waste the bytes anyway).
build_flags =
  -D FT_PROJECT=1