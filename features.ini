[features]
; Compile-time feature toggles. Each FT_* macro is read by:
;   1. The corresponding C++ service (`#if FT_ENABLED(FT_X)` blocks
;      gate auth handlers, persistence reads, periodic loops).
;   2. App.cpp::registerBuildFeature("x", FT_ENABLED(FT_X)) which
;      surfaces the bool in /rest/uiManifest.buildFeatures.
;   3. The React frontend reads manifest.buildFeatures.x and shows /
;      hides corresponding UI surfaces.
;
; Turning a flag from 1→0 means: the service is disabled at compile
; time (its code may still link but its runtime entry points become
; no-ops), the manifest reports buildFeatures.x = false, and the
; frontend skips that feature's menu item / tab. The Builder()
; .install<XxxModule>() call in main.cpp is independent — installing
; a module without enabling its flag results in dead code; enabling
; the flag without installing the module gates UI but offers no
; backend. Keep them in sync.
;
; FT_PROJECT — gates the consumer's own service (LightStateService).
; Set 0 to ship a "framework-only" build with no Light tab.
build_flags =
  -D FT_PROJECT=1
  -D FT_SECURITY=1
  -D FT_SECRETS_VAULT=1
  -D FT_MQTT=1
  -D FT_NTP=1
  -D FT_OTA=1
  -D FT_UPLOAD_FIRMWARE=1
  -D FT_TELEGRAM=1
  -D FT_WEBSOCKET=1
  -D FT_AUTO_UPDATE=1
  -D FT_SYSTEM_INFO=1