[features]
; Phase 1.7: LightControlModule landed in the demo — FT_PROJECT=1
; activates the Light tab (every FormBuilder widget driven by a
; sin/cos generator). A few hardware peripherals (FT_GPS, FT_PZEM)
; remain off pending dedicated modules.
build_flags =
  -D FT_PROJECT=1
  -D FT_SECURITY=1
  -D FT_SECRETS_VAULT=1
  -D FT_MQTT=1
  -D FT_NTP=1
  -D FT_OTA=1
  -D FT_UPLOAD_FIRMWARE=1
  -D FT_GPS=0
  -D FT_PZEM=0
  -D FT_TELEGRAM=1
  -D FT_WEBSOCKET=1
  -D FT_AUTO_UPDATE=1
  -D FT_SYSTEM_INFO=1