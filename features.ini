[features]
; Phase 1.x: LightControl + a few peripherals not yet ported, so the
; corresponding feature flags stay off. SecurityModule landed in the
; demo this iteration — FT_SECURITY=1 again, login screen reactivated.
build_flags =
  -D FT_PROJECT=0
  -D FT_SECURITY=1
  -D FT_SECRETS_VAULT=1
  -D FT_MQTT=1
  -D FT_NTP=1
  -D FT_OTA=1
  -D FT_UPLOAD_FIRMWARE=1
  -D FT_GPS=0
  -D FT_PZEM=0
  -D FT_TELEGRAM=1
  -D FT_WEBSOCKET=1
  -D FT_AUTO_UPDATE=1
  -D FT_SYSTEM_INFO=1